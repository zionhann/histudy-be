name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Set JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run Tests
        run: ./gradlew test

  docker:
    name: Build & Push Docker Image (main only)
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      sha_ref: ${{ steps.image.outputs.sha_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          IMAGE_REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${IMAGE_REPOSITORY}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          DEV_TAG="dev"

          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_ref=${IMAGE_NAME}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "dev_ref=${IMAGE_NAME}:${DEV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.sha_ref }}
            ${{ steps.image.outputs.dev_ref }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  jenkins:
    name: Trigger Jenkins Deploy (main only, non-blocking)
    runs-on: ubuntu-latest
    needs: docker
    env:
      JENKINS_WEBHOOK_URL: ${{ secrets.JENKINS_WEBHOOK_URL }}

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Jenkins webhook
        if: env.JENKINS_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SHA_REF: ${{ needs.docker.outputs.sha_ref }}
        run: |
          set -eu

          curl --fail --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --max-time 15 \
            -X POST \
            -H "Content-Type: application/json" \
            -d @- \
            "${JENKINS_WEBHOOK_URL}" <<EOF
          {
            "event": "github_actions_cd",
            "branch": "${BRANCH}",
            "sha": "${SHA}",
            "sha_ref": "${SHA_REF}"
          }
          EOF
