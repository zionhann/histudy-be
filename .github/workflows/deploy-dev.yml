name: Deploy Dev

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HOST_PORT: ${{ vars.DEPLOY_HOST_PORT || '8080' }}
  ACTIVE_PROFILE: ${{ vars.DEPLOY_ACTIVE_PROFILE || 'dev' }}
  CONFIG_PATH: ${{ vars.DEPLOY_CONFIG_PATH || '/etc/histudy-be/' }}
  IMAGE_NAME: ${{ vars.DEPLOY_IMAGE_NAME || 'histudy-be' }}

jobs:
  deploy:
    name: Deploy to dev
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: [self-hosted, HIStudy, dev]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare deployment metadata
        shell: bash
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          echo "IMAGE_TAG=sha-${DEPLOY_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build and deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --build
