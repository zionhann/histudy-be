services:
  histudy-api:
    image: ${IMAGE_REF}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment: 
      SPRING_PROFILES_ACTIVE: "${ACTIVE_PROFILE:-dev}"
    volumes:
      - ${CONFIG_PATH}:/config/:ro
      - webapp_images:/webapp/image
      - webapp_logs:/webapp/log

volumes:
  webapp_images:
  webapp_logs:
